name: Deploy WeldSnap to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js Standalone
        run: pnpm build

      - name: Sync Files to Web Directory
        run: |
          DEPLOY_DIR=/var/www/WeldSnap
          mkdir -p "$DEPLOY_DIR"

          # 同步源码和构建产物，排除持久化数据和开发产物
          rsync -av --delete \
            --exclude='data' \
            --exclude='exports' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='config.json' \
            --exclude='.next/cache' \
            ./ "$DEPLOY_DIR/"

          # Next.js standalone 需要静态资源和 public 目录
          mkdir -p "$DEPLOY_DIR/.next/standalone/public"
          cp -r public/* "$DEPLOY_DIR/.next/standalone/public/" 2>/dev/null || true
          mkdir -p "$DEPLOY_DIR/.next/standalone/.next/static"
          cp -r .next/static/* "$DEPLOY_DIR/.next/standalone/.next/static/" 2>/dev/null || true

          # 确保持久化目录存在
          mkdir -p "$DEPLOY_DIR/data"
          mkdir -p "$DEPLOY_DIR/exports"

      - name: Install Dependencies and Restart Server
        env:
          RUNNER_TRACKING_ID: to-prevent-killing  # 防止 GitHub Actions 完成后杀掉 PM2 守护的 Node 后台进程
        run: |
          cd /var/www/WeldSnap
          pnpm install --frozen-lockfile
          # PM2 重启 Next.js standalone 服务（非 V1 Express server.js）
          pm2 delete weld-photo-system || true
          pm2 start .next/standalone/server.js \
            --name weld-photo-system \
            --interpreter /opt/node-v22/bin/node \
            --node-args="--experimental-sqlite"
          pm2 save
