<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>照片录入 - 焊口照片录入系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="upload-page">
  <div class="header">
    <h1>焊口照片录入</h1>
    <span class="logout" onclick="logout()">退出</span>
  </div>

  <!-- 录入表单 -->
  <div id="uploadForm">
    <!-- 管线号 -->
    <div class="section-label">管线号</div>
    <div id="pipelineSection">
      <div class="search-box" id="searchBox" style="display:none;">
        <input type="text" id="pipelineSearch" placeholder="输入管线号搜索" autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
      <div class="pipeline-display" id="pipelineDisplay" style="display:none;"></div>
    </div>

    <!-- 焊口号 -->
    <div id="weldSection" style="display:none;">
      <div class="section-label">焊口号</div>
      <select class="weld-select" id="weldSelect" onchange="onWeldSelected()">
        <option value="">请选择焊口号</option>
      </select>
    </div>

    <!-- 照片上传 -->
    <div id="photoSection" style="display:none;">
      <div class="section-label" style="margin-top:20px;">工序照片</div>
      <div class="photo-slots" id="photoSlots">
        <div class="photo-slot" id="slot-zudui">
          <div class="photo-slot-header">
            <span class="name">组对</span>
            <span class="status text-pending" id="status-zudui">未上传</span>
          </div>
          <div class="photo-slot-body" id="body-zudui">
            <div class="placeholder">
              <div class="icon">📷</div>
              <p>点击拍照</p>
            </div>
          </div>
          <div style="padding:8px;text-align:center;">
            <button class="capture-btn" id="btn-zudui" onclick="triggerCapture('zudui')">拍照上传</button>
            <input type="file" id="input-zudui" accept="image/*" capture="environment" style="display:none;" onchange="uploadPhoto('zudui', this)">
          </div>
        </div>

        <div class="photo-slot" id="slot-dadi">
          <div class="photo-slot-header">
            <span class="name">打底</span>
            <span class="status text-pending" id="status-dadi">未上传</span>
          </div>
          <div class="photo-slot-body" id="body-dadi">
            <div class="placeholder">
              <div class="icon">📷</div>
              <p>点击拍照</p>
            </div>
          </div>
          <div style="padding:8px;text-align:center;">
            <button class="capture-btn" id="btn-dadi" onclick="triggerCapture('dadi')">拍照上传</button>
            <input type="file" id="input-dadi" accept="image/*" capture="environment" style="display:none;" onchange="uploadPhoto('dadi', this)">
          </div>
        </div>

        <div class="photo-slot" id="slot-gaimian">
          <div class="photo-slot-header">
            <span class="name">盖面</span>
            <span class="status text-pending" id="status-gaimian">未上传</span>
          </div>
          <div class="photo-slot-body" id="body-gaimian">
            <div class="placeholder">
              <div class="icon">📷</div>
              <p>点击拍照</p>
            </div>
          </div>
          <div style="padding:8px;text-align:center;">
            <button class="capture-btn" id="btn-gaimian" onclick="triggerCapture('gaimian')">拍照上传</button>
            <input type="file" id="input-gaimian" accept="image/*" capture="environment" style="display:none;" onchange="uploadPhoto('gaimian', this)">
          </div>
        </div>
      </div>

      <div class="upload-actions">
        <button class="btn btn-outline" onclick="resetForm()">重置</button>
        <button class="btn btn-primary" id="submitBtn" onclick="submitAll()" disabled>提交完成</button>
      </div>
    </div>
  </div>

  <!-- 成功页面 -->
  <div class="success-page" id="successPage" style="display:none;">
    <div class="check">✓</div>
    <h2>上传成功</h2>
    <p id="successDetail"></p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-outline" onclick="resetForm()">继续录入下一个</button>
    </div>
  </div>
</div>
<script src="/js/upload.js"></script>
</body>
</html>
