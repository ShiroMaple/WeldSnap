<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管道焊口工序照片录入系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1>管道焊口工序照片录入系统</h1>
      <p class="subtitle">请登录后使用</p>
      <div id="alert" class="alert alert-error" style="display:none;"></div>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">登 录</button>
    </div>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
